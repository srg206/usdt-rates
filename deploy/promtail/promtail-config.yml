server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Logs only from the API container named `app` (see docker-compose container_name).
  - job_name: usdt-rates
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /app
        action: keep
      - source_labels: [__meta_docker_container_log_path]
        target_label: __path__
      - target_label: job
        replacement: usdt-rates
      - target_label: service_name
        replacement: usdt-rates
    pipeline_stages:
      - docker: {}
